<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyMind</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --surface: #ffffff; --border: #e8e6e1; --border2: #d0cdc6;
    --text: #1a1917; --muted: #8a8680; --accent: #2563eb;
    --accent-dim: rgba(37,99,235,0.07); --tag-bg: #eeecea; --tag-text: #5a5754;
    --danger: #dc2626; --green: #16a34a; --radius: 8px;
    --font: 'DM Sans', system-ui, sans-serif; --max: 680px;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; line-height: 1.6; }

  /* PIN SCREEN */
  #pin-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 1.5rem; padding: 2rem; }
  .brand h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: -0.03em; text-align: center; margin-bottom: 4px; }
  .brand p { color: var(--muted); font-size: 12px; text-align: center; }
  .pin-form { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #pin-input {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 16px; font-family: var(--font); font-size: 15px; font-weight: 500;
    text-align: center; letter-spacing: 0.2em; width: 180px; outline: none;
    transition: border 0.15s; color: var(--text);
  }
  #pin-input:focus { border-color: var(--accent); }
  #pin-input::placeholder { letter-spacing: 0; font-weight: 400; font-size: 13px; color: var(--muted); }
  .pin-error { font-size: 12px; color: var(--danger); display: none; }
  .pin-error.show { display: block; }
  .btn-pin {
    background: var(--text); color: #fff; border: none; padding: 9px 24px;
    border-radius: var(--radius); font-family: var(--font); font-size: 13px;
    font-weight: 500; cursor: pointer; transition: opacity 0.15s; width: 180px;
  }
  .btn-pin:hover { opacity: 0.78; }

  /* APP */
  #app { display: none; }
  .wrap { max-width: var(--max); margin: 0 auto; padding: 0 1.5rem; }

  header { border-bottom: 1px solid var(--border); background: rgba(245,244,240,0.95); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
  .header-inner { max-width: var(--max); margin: 0 auto; padding: 0 1.5rem; height: 48px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 14px; font-weight: 500; letter-spacing: -0.01em; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
  .btn-lock { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 4px 6px; border-radius: 4px; transition: color 0.15s; font-family: var(--font); }
  .btn-lock:hover { color: var(--text); }

  #ai-bar { padding: 12px 0 10px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .ai-bar-inner { max-width: var(--max); margin: 0 auto; padding: 0 1.5rem; display: flex; gap: 8px; align-items: flex-end; }
  #ai-input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-family: var(--font); font-size: 13px; outline: none;
    transition: border 0.15s; resize: none; min-height: 40px; max-height: 120px; line-height: 1.5;
  }
  #ai-input:focus { border-color: var(--accent); background: var(--surface); }
  #ai-input::placeholder { color: var(--muted); }
  #ai-btn {
    background: var(--text); color: #fff; border: none; padding: 0 16px;
    border-radius: 8px; font-family: var(--font); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: opacity 0.15s; height: 40px; white-space: nowrap; flex-shrink: 0;
  }
  #ai-btn:hover { opacity: 0.78; }
  #ai-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
  #thinking { max-width: var(--max); margin: 0 auto; padding: 10px 1.5rem; font-size: 12px; color: var(--muted); display: none; align-items: center; gap: 5px; }
  #thinking.on { display: flex; }
  .td { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); animation: pulse 1.2s infinite; }
  .td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}

  #ai-response { max-width: var(--max); margin: 10px auto 0; padding: 0 1.5rem; display: none; }
  #ai-response.on { display: block; }
  .ai-msg { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-size: 13px; line-height: 1.6; }
  .confirm-actions { display: flex; gap: 6px; margin-top: 10px; }
  .btn-yes { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn-yes:hover { opacity: 0.85; }
  .btn-no { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 6px; font-family: var(--font); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-no:hover { border-color: var(--danger); color: var(--danger); }

  main { padding: 1.5rem 0 4rem; }
  #tags-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .tag-pill { background: var(--tag-bg); color: var(--tag-text); border: 1px solid transparent; border-radius: 20px; padding: 3px 10px; font-size: 11px; cursor: pointer; transition: all 0.12s; font-family: var(--font); }
  .tag-pill:hover { border-color: var(--border2); }
  .tag-pill.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

  .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .btn-add { background: var(--accent); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn-add:hover { opacity: 0.85; }

  #items-list { display: flex; flex-direction: column; gap: 6px; }
  .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; cursor: pointer; transition: border-color 0.12s; position: relative; }
  .item-card:hover { border-color: var(--border2); }
  .item-card.type-link { border-left: 2px solid #93c5fd; }
  .item-card.type-note { border-left: 2px solid var(--border2); }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; }
  .card-url { font-size: 11px; color: var(--accent); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
  .card-note { font-size: 12px; color: var(--muted); margin-top: 5px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-bottom { display: flex; align-items: center; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .card-tag { background: var(--tag-bg); color: var(--tag-text); border-radius: 4px; padding: 1px 7px; font-size: 11px; }
  .card-date { font-size: 11px; color: var(--muted); margin-left: auto; opacity: 0.6; }
  .card-actions { display: none; gap: 4px; flex-shrink: 0; }
  .item-card:hover .card-actions { display: flex; }
  .card-btn { background: var(--bg); border: 1px solid var(--border); color: var(--muted); width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all 0.12s; }
  .card-btn:hover { color: var(--text); border-color: var(--border2); }
  .card-btn.del:hover { color: var(--danger); border-color: var(--danger); }

  #empty { display: none; text-align: center; padding: 4rem 2rem; color: var(--muted); }
  #empty p { font-size: 13px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.4rem; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
  .modal h2 { font-size: 14px; font-weight: 500; margin-bottom: 1.2rem; }
  .form-group { margin-bottom: 0.9rem; }
  .form-group label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .form-group input, .form-group textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-family: var(--font); font-size: 13px; outline: none; transition: border 0.15s; resize: vertical; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .type-toggle { display: flex; gap: 6px; margin-bottom: 0.9rem; }
  .type-btn { flex: 1; padding: 7px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.12s; }
  .type-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
  .modal-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 1.2rem; }
  .btn-save { background: var(--accent); color: #fff; border: none; padding: 7px 18px; border-radius: 6px; font-family: var(--font); font-size: 12px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--muted); padding: 7px 14px; border-radius: 6px; font-family: var(--font); font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn-cancel:hover { border-color: var(--border2); color: var(--text); }

  #toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--text); color: #fff; padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 500; opacity: 0; transform: translateY(6px); transition: all 0.2s; z-index: 300; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <div class="brand">
    <h1>mymind</h1>
    <p>your personal knowledge store</p>
  </div>
  <div class="pin-form">
    <input type="password" id="pin-input" placeholder="enter your key" autocomplete="off" onkeydown="if(event.key==='Enter')unlock()">
    <div class="pin-error" id="pin-error">incorrect key</div>
    <button class="btn-pin" onclick="unlock()">unlock</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-inner">
      <div class="logo">mymind</div>
      <div class="header-right">
        <span class="sync-dot" id="sync-dot"></span>
        <button class="btn-lock" onclick="lock()" title="Lock">lock</button>
      </div>
    </div>
  </header>

  <div id="ai-bar">
    <div class="ai-bar-inner">
      <textarea id="ai-input" rows="1" placeholder="save a link, find something, ask anything..."></textarea>
      <button id="ai-btn" onclick="handleInput()">↵</button>
    </div>
  </div>

  <div id="thinking" class="wrap"><div class="td"></div><div class="td"></div><div class="td"></div><span style="margin-left:5px;">thinking...</span></div>
  <div id="ai-response" class="wrap"></div>

  <div class="wrap">
    <main>
      <div id="tags-bar"></div>
      <div class="list-header">
        <div id="item-count" style="font-size:12px;color:var(--muted);"></div>
        <button class="btn-add" onclick="openModal()">+ add</button>
      </div>
      <div id="items-list"></div>
      <div id="empty"><p>nothing saved yet</p></div>
    </main>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modal-title">New item</h2>
    <div class="type-toggle">
      <button class="type-btn active" id="type-link" onclick="setType('link')">Link</button>
      <button class="type-btn" id="type-note" onclick="setType('note')">Note</button>
    </div>
    <div class="form-group" id="url-group">
      <label>URL</label>
      <input type="url" id="input-url" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="input-title" placeholder="what is this?">
    </div>
    <div class="form-group">
      <label>Note</label>
      <textarea id="input-note" rows="3" placeholder="why did you save this?"></textarea>
    </div>
    <div class="form-group">
      <label>Tags <span style="opacity:0.5;font-weight:400">(comma separated)</span></label>
      <input type="text" id="input-tags" placeholder="design, tools, read-later">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const WORKER = 'https://mymind-api.notismymind.workers.dev';

let apiSecret = null;
let items = [];
let editingId = null;
let activeType = 'link';
let activeTag = null;
let pendingAction = null;

// ── PIN / LOCK ────────────────────────────────────────────────
async function unlock() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin) return;

  // Test the key against the Worker
  try {
    const res = await fetch(WORKER, { headers: { 'Authorization': 'Bearer ' + pin } });
    if (res.status === 401) {
      document.getElementById('pin-error').classList.add('show');
      document.getElementById('pin-input').value = '';
      return;
    }
    const data = await res.json();
    apiSecret = pin;
    sessionStorage.setItem('mm_key', pin);
    items = data.items || [];
    showApp();
  } catch(e) {
    document.getElementById('pin-error').classList.add('show');
    document.getElementById('pin-error').textContent = 'could not connect';
  }
}

function lock() {
  apiSecret = null;
  sessionStorage.removeItem('mm_key');
  items = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('pin-input').value = '';
  document.getElementById('pin-error').classList.remove('show');
}

function showApp() {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderAll();
  setSyncing(false);
}

// ── WORKER API ───────────────────────────────────────────────
async function api(method, body, query='') {
  setSyncing(true);
  const res = await fetch(WORKER + query, {
    method,
    headers: { 'Authorization': 'Bearer ' + apiSecret, 'Content-Type': 'application/json' },
    ...(body ? { body: JSON.stringify(body) } : {})
  });
  setSyncing(false);
  if (!res.ok) throw new Error('API error ' + res.status);
  return res.json();
}

function setSyncing(on) {
  document.getElementById('sync-dot').className = 'sync-dot' + (on ? ' syncing' : '');
}

// ── AI INPUT ─────────────────────────────────────────────────
async function handleInput() {
  const inputEl = document.getElementById('ai-input');
  const raw = inputEl.value.trim();
  if (!raw) return;

  document.getElementById('ai-btn').disabled = true;
  setThinking(true);
  clearResponse();

  try {
    const summary = items.map(i => ({ id: i.id, title: i.title, note: i.note, url: i.url, tags: i.tags, type: i.type }));

    const res = await fetch(WORKER + '/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiSecret },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 600,
        system: `You are the AI brain of a personal knowledge app called MyMind. The user has ${items.length} saved items.

Actions you can perform:
- SAVE: user wants to save a new link or note
- SEARCH: user wants to find something
- FILTER: user wants to filter by tag or type
- DELETE: user wants to delete an item
- SHOW_ALL: user wants to see everything / clear filter
- CHAT: general question about saved items

Current items: ${JSON.stringify(summary)}

Respond with ONLY a JSON object:
{
  "action": "SAVE|SEARCH|FILTER|DELETE|SHOW_ALL|CHAT",
  "message": "short friendly response (plain text)",
  "data": {
    // SAVE: { type, title (plain ASCII, no special chars), url, note, tags[] }
    // SEARCH: { ids: [matching item ids by relevance] }
    // FILTER: { tag: "name" } or { type: "link|note" }
    // DELETE: { id: "item id", title: "item title" }
    // SHOW_ALL or CHAT: {}
  }
}`,
        messages: [{ role: 'user', content: raw }]
      })
    });

    const data = await res.json();
    console.log('AI response:', JSON.stringify(data).slice(0,300));
    const rawContent = data.content || data.choices?.[0]?.message?.content;
    if (!rawContent) throw new Error('Empty response: ' + JSON.stringify(data).slice(0,200));
    let text = (Array.isArray(rawContent) ? rawContent[0].text : rawContent).trim();
    text = text.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('No JSON: ' + text.slice(0,100));
    const result = JSON.parse(jsonMatch[0]);
    await executeAction(result, inputEl);

  } catch(e) {
    showResponse('<p>Something went wrong: ' + esc(e.message) + '</p>');
    console.error('MyMind error:', e);
  } finally {
    document.getElementById('ai-btn').disabled = false;
    setThinking(false);
  }
}

async function executeAction(result, inputEl) {
  const { action, message, data } = result;

  if (action === 'SAVE') {
    pendingAction = { type: 'SAVE', item: data };
    showResponse(`
      <div style="margin-bottom:10px;">${esc(message)}</div>
      <div style="font-size:13px;font-weight:500;margin-bottom:3px;">${esc(data.title)}</div>
      ${data.url ? `<div style="font-size:11px;color:var(--accent);margin-bottom:4px;font-family:monospace;">${esc(data.url)}</div>` : ''}
      ${data.note ? `<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">${esc(data.note)}</div>` : ''}
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;">${(data.tags||[]).map(t=>`<span class="card-tag">${esc(t)}</span>`).join('')}</div>
      <div class="confirm-actions">
        <button class="btn-yes" onclick="confirmAction()">save</button>
        <button class="btn-no" onclick="cancelAction()">discard</button>
      </div>
    `);
    inputEl.value = '';

  } else if (action === 'DELETE') {
    pendingAction = { type: 'DELETE', id: data.id };
    showResponse(`
      <div style="margin-bottom:10px;">${esc(message)}</div>
      <div class="confirm-actions">
        <button class="btn-yes" onclick="confirmAction()">delete</button>
        <button class="btn-no" onclick="cancelAction()">cancel</button>
      </div>
    `);

  } else if (action === 'SEARCH') {
    const matched = (data.ids||[]).map(id=>items.find(i=>i.id===id)).filter(Boolean);
    renderAll(matched);
    showResponse(`<div>${esc(message)}</div>`);
    setTimeout(clearResponse, 3000);
    inputEl.value = '';

  } else if (action === 'FILTER') {
    if (data.tag) activeTag = data.tag;
    renderAll();
    showResponse(`<div>${esc(message)}</div>`);
    setTimeout(clearResponse, 2500);
    inputEl.value = '';

  } else if (action === 'SHOW_ALL') {
    activeTag = null;
    renderAll();
    clearResponse();
    inputEl.value = '';

  } else if (action === 'CHAT') {
    showResponse(`<div>${esc(message)}</div>`);
    inputEl.value = '';
  }
}

async function confirmAction() {
  if (!pendingAction) return;
  if (pendingAction.type === 'SAVE') {
    const res = await api('POST', pendingAction.item);
    items.push(res.item);
    renderAll(); showToast('saved');
  } else if (pendingAction.type === 'DELETE') {
    await api('DELETE', null, '?id='+pendingAction.id);
    items = items.filter(i=>i.id!==pendingAction.id);
    renderAll(); showToast('deleted');
  }
  pendingAction = null;
  clearResponse();
}

function cancelAction() { pendingAction = null; clearResponse(); }
function setThinking(on) { document.getElementById('thinking').className = on ? 'wrap on' : 'wrap'; }
function showResponse(html) { const el=document.getElementById('ai-response'); el.innerHTML=`<div class="ai-msg">${html}</div>`; el.className='wrap on'; }
function clearResponse() { const el=document.getElementById('ai-response'); el.className='wrap'; el.innerHTML=''; }

// ── RENDER ───────────────────────────────────────────────────
function renderAll(filteredOverride) {
  let filtered = filteredOverride || [...items].reverse().filter(i => !activeTag||(i.tags&&i.tags.includes(activeTag)));
  const list = document.getElementById('items-list');
  const empty = document.getElementById('empty');
  const count = document.getElementById('item-count');
  count.textContent = filtered.length + ' item' + (filtered.length!==1?'s':'');
  if (filtered.length===0) { list.innerHTML=''; empty.style.display='block'; }
  else { empty.style.display='none'; list.innerHTML=filtered.map(cardHTML).join(''); }
  renderTags();
}

function cardHTML(item) {
  const tagsHTML=(item.tags||[]).map(t=>`<span class="card-tag">${esc(t)}</span>`).join('');
  const dateStr=item.created?new Date(item.created).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'';
  const urlDisplay=item.url?item.url.replace(/^https?:\/\//,'').split('/')[0]:'';
  return `<div class="item-card type-${item.type||'note'}" onclick="openItem('${item.id}')">
    <div class="card-top">
      <div style="min-width:0;flex:1;">
        ${item.title?`<div class="card-title">${esc(item.title)}</div>`:''}
        ${item.url?`<div class="card-url">${esc(urlDisplay)}</div>`:''}
      </div>
      <div class="card-actions">
        <button class="card-btn" onclick="event.stopPropagation();editItem('${item.id}')">✎</button>
        <button class="card-btn del" onclick="event.stopPropagation();deleteItem('${item.id}')">✕</button>
      </div>
    </div>
    ${item.note?`<div class="card-note">${esc(item.note)}</div>`:''}
    <div class="card-bottom">${tagsHTML}<span class="card-date">${dateStr}</span></div>
  </div>`;
}

function renderTags() {
  const all=new Set(); items.forEach(i=>(i.tags||[]).forEach(t=>all.add(t)));
  const bar=document.getElementById('tags-bar');
  if (!all.size){bar.innerHTML='';return;}
  bar.innerHTML=[...all].sort().map(t=>`<button class="tag-pill ${activeTag===t?'active':''}" onclick="toggleTag('${t}')">${esc(t)}</button>`).join('');
}

function toggleTag(tag){activeTag=activeTag===tag?null:tag;renderAll();}
function openItem(id){const item=items.find(i=>i.id===id);if(!item)return;if(item.url)window.open(item.url,'_blank');else editItem(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── MODAL ────────────────────────────────────────────────────
function openModal(item=null){
  editingId=item?item.id:null;
  document.getElementById('modal-title').textContent=item?'Edit item':'New item';
  document.getElementById('input-url').value=item?.url||'';
  document.getElementById('input-title').value=item?.title||'';
  document.getElementById('input-note').value=item?.note||'';
  document.getElementById('input-tags').value=(item?.tags||[]).join(', ');
  setType(item?.type||'link');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editingId=null;}
function setType(type){
  activeType=type;
  document.getElementById('type-link').className='type-btn'+(type==='link'?' active':'');
  document.getElementById('type-note').className='type-btn'+(type==='note'?' active':'');
  document.getElementById('url-group').style.display=type==='link'?'block':'none';
}
async function saveItem(){
  const url=document.getElementById('input-url').value.trim();
  const title=document.getElementById('input-title').value.trim();
  const note=document.getElementById('input-note').value.trim();
  const tags=document.getElementById('input-tags').value.trim().split(',').map(t=>t.trim()).filter(Boolean);
  const btn=document.getElementById('save-btn');
  btn.disabled=true; btn.textContent='Saving...';
  if(editingId){
    await api('PATCH',{id:editingId,url,title,note,tags,type:activeType});
    const idx=items.findIndex(i=>i.id===editingId);
    if(idx>-1)items[idx]={...items[idx],url,title,note,tags,type:activeType};
  } else {
    const res=await api('POST',{type:activeType,url,title,note,tags});
    items.push(res.item);
  }
  closeModal();renderAll();showToast(editingId?'Updated':'Saved');
  btn.disabled=false;btn.textContent='Save';
}
function editItem(id){const item=items.find(i=>i.id===id);if(item)openModal(item);}
async function deleteItem(id){
  await api('DELETE',null,'?id='+id);
  items=items.filter(i=>i.id!==id);
  renderAll();showToast('Removed');
}

// ── TOAST ────────────────────────────────────────────────────
let tt;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2200);}

// ── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();cancelAction();}
});
document.getElementById('ai-input')?.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleInput();}
});

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  const saved=sessionStorage.getItem('mm_key');
  if(saved){
    apiSecret=saved;
    fetch(WORKER,{headers:{'Authorization':'Bearer '+saved}})
      .then(r=>r.json())
      .then(d=>{items=d.items||[];showApp();})
      .catch(()=>{}); // stay on pin screen if fails
  }
});
</script>
</body>
</html>
